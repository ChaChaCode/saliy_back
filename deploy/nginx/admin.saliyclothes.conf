# ─────────────────────────────────────────────────────────────────────────────
# admin.saliyclothes.com — админка, статический SPA (Vite build).
# Ставится в /etc/nginx/sites-available/admin.saliyclothes, симлинк в sites-enabled.
#
# root указывает на собранный dist. gzip наследуется из http-tuning.conf.
# SSL-строки ставит certbot (общий сертификат saliyclothes.com покрывает admin.*).
# ─────────────────────────────────────────────────────────────────────────────

server {
    server_name admin.saliyclothes.com;

    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate /etc/letsencrypt/live/saliyclothes.com/fullchain.pem;      # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/saliyclothes.com/privkey.pem;    # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                           # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                             # managed by Certbot

    root /home/deploy/apps/saliy_admin/dist;
    index index.html;

    client_max_body_size 25M;

    # ── Security-заголовки ──
    # Админка ходит на API cross-origin (admin.* → saliyclothes.com/api), это ок.
    # frame-ancestors 'none' + X-Frame-Options DENY — админку нельзя встроить в iframe.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Иммутабельные ассеты Vite (хэш в имени) — кэш навсегда ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA: все маршруты через index.html ──
    # index.html НЕ кэшируем — иначе новый деплой не подхватится у клиента.
    # Security-заголовки повторяем здесь: свой add_header в location отменяет
    # наследование серверных, поэтому их нужно продублировать.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}

# ── HTTP → HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name admin.saliyclothes.com;
    return 301 https://$host$request_uri;
}
