# ─────────────────────────────────────────────────────────────────────────────
# saliyclothes.com + www — фронт Next.js SSR (:3001) и API NestJS (:3000).
# Ставится в /etc/nginx/sites-available/saliyclothes, симлинк в sites-enabled.
#
# Зависит от http-tuning.conf (map $connection_upgrade, upstream saliy_api /
# saliy_front, limit_req_zone api_limit, gzip_types). Подключить его ПЕРВЫМ.
#
# SSL-строки (ssl_certificate, options-ssl-nginx.conf, ssl-dhparams) ставит
# certbot — их менять не нужно, при переносе оставить как есть.
# ─────────────────────────────────────────────────────────────────────────────

server {
    server_name saliyclothes.com www.saliyclothes.com;

    # HTTP/2: в nginx 1.24 включается суффиксом в listen (директива http2 on;
    # появилась только в 1.25.1). На 1.25+ можно заменить на `http2 on;`.
    listen 443 ssl http2;
    listen [::]:443 ssl http2 ipv6only=on;

    ssl_certificate /etc/letsencrypt/live/saliyclothes.com/fullchain.pem;      # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/saliyclothes.com/privkey.pem;    # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                           # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                             # managed by Certbot

    # Загрузка картинок товаров и т.п.
    client_max_body_size 25M;

    # ── Security-заголовки для страниц фронта ──
    # Ставятся на все ответы этого server, КРОМЕ /api/ (там свои от helmet).
    # always — чтобы заголовки были и на 4xx/5xx.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Статика Next отдаётся с диска, минуя Node ──
    # /_next/static/* — иммутабельные ассеты с хэшем в имени. nginx отдаёт их
    # напрямую с диска (быстрее, чем через SSR-процесс) и кэширует навсегда.
    location /_next/static/ {
        alias /home/deploy/apps/saliy_front/.next/static/;
        # НЕ ставим expires — он генерит свой Cache-Control и дублирует
        # заголовок ниже. Задаём Cache-Control явно (immutable полнее).
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;   # свой add_header отменяет наследование — дублируем nosniff
        access_log off;
    }

    # ── API → NestJS :3000 ──
    # Security-заголовки на /api ставит helmet в бэке (единый источник). Здесь
    # своих add_header нет, но родительские серверные заголовки на проксированный
    # ответ nginx НЕ наследует автоматически на add_header, если ответ пришёл от
    # upstream с теми же именами — во избежание дублей helmet и nginx выключены:
    # серверные add_header выше применяются к ответам этого server, а для /api
    # источником безопасности остаётся helmet. HSTS дублируется (безвредно —
    # браузер берёт первый), при желании изолировать — вынести в отдельный map.
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass http://saliy_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";     # keepalive к upstream (пул из upstream-блока)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Всё остальное → Next.js SSR :3001 ──
    location / {
        proxy_pass http://saliy_front;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;   # keepalive + websocket через map
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}

# ── HTTP → HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name saliyclothes.com www.saliyclothes.com;
    return 301 https://$host$request_uri;
}
