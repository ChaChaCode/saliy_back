# ─────────────────────────────────────────────────────────────────────────────
# Глобальные настройки для http-блока nginx (saliyclothes).
#
# Эти директивы должны находиться ВНУТРИ блока `http { ... }` файла
# /etc/nginx/nginx.conf. Проще всего положить этот файл как
# /etc/nginx/conf.d/00-tuning.conf — он подключается через
# `include /etc/nginx/conf.d/*.conf;`, который уже есть в http-блоке.
#
# ВАЖНО: базовый gzip_types в стоковом nginx.conf закомментирован, поэтому
# сжимается только text/html. Здесь включаем сжатие для JS/CSS/JSON/SVG/шрифтов.
# ─────────────────────────────────────────────────────────────────────────────

# ── Сжатие ──
# gzip on уже включён в стоковом /etc/nginx/nginx.conf — здесь НЕ повторяем
# (директива duplicate → nginx -t падает). Задаём только типы и параметры.
gzip_vary on;                 # добавляет Vary: Accept-Encoding (правильное кэширование)
gzip_proxied any;             # сжимать и проксированные ответы (фронт/API за upstream)
gzip_comp_level 6;            # баланс CPU/степень сжатия
gzip_min_length 1024;         # не жать мелочь (накладные расходы больше выгоды)
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    application/vnd.ms-fontobject
    application/wasm
    font/ttf
    font/otf
    image/svg+xml;
# text/html жмётся всегда (его в gzip_types указывать не нужно и нельзя).

# ── keepalive к upstream ──
# map превращает заголовок Upgrade в значение для Connection:
#   есть Upgrade (websocket)  → Connection: upgrade
#   нет Upgrade (обычный HTTP) → Connection: "" (пустой, keepalive сохраняется)
# Раньше в location / стояло Connection 'upgrade' наглухо — это ломало keepalive
# для всех обычных запросов к Next.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# ── Пул соединений к бэкенду NestJS (keepalive) ──
upstream saliy_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Пул соединений к фронту Next.js SSR ──
upstream saliy_front {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── Rate limit для API ──
# Внешний грубый слой поверх @nestjs/throttler. Ключ — реальный IP клиента
# (nginx за TLS, IP берётся из соединения). 30 r/s на IP со всплеском до 60.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ── Не раскрывать версию nginx ──
server_tokens off;
